name: "✨ Feature"
description: "기능/작업 기록"
title: "[Feature] "
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "한줄"
      placeholder: "예) 포트폴리오 상세 페이지에 Vimeo 임베드 추가"
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: "할 일"
      placeholder: |
        - [ ]
        - [ ]
    validations:
      required: false

  - type: textarea
    id: memo
    attributes:
      label: "메모"
      placeholder: |
        결정사항:
        참고:
    validations:
      required: false
